name: one

on:
   workflow_dispatch:
      inputs:
         version_bump:
            description: "Version bump (patch, minor, major)"
            required: true
            type: choice
            options:
               - patch
               - minor
               - major
         custom_tag:
            description: "Additional tag (optional, e.g. stable, beta)"
            required: false
            type: string

jobs:
   build-and-push:
      runs-on: [self-hosted, linux, x64]
      permissions:
         contents: write

      steps:
         - name: Checkout repository
           uses: actions/checkout@v4

         - name: Bump version and push tag
           id: tag_version
           uses: mathieudutour/github-tag-action@v6.1
           with:
              github_token: ${{ secrets.GITHUB_TOKEN }}
              default_bump: ${{ inputs.version_bump }}
              tag_prefix: v

         - name: Set up Docker Buildx
           uses: docker/setup-buildx-action@v3

         - name: Log in to Docker Hub
           uses: docker/login-action@v3
           with:
              username: ${{ secrets.DOCKER_USER }}
              password: ${{ secrets.DOCKER_TOKEN }}

         - name: Build Docker tags
           id: tags
           run: |
              REPO="docker.io/timefactory/${{ github.event.repository.name }}"
              VERSION="${{ steps.tag_version.outputs.new_tag }}"

              TAGS="${REPO}:${VERSION}"

              if [ "${{ inputs.version_bump }}" = "patch" ]; then
                TAGS="${TAGS},${REPO}:dev"
                echo "platforms=linux/amd64,linux/arm64" >> $GITHUB_OUTPUT
              elif [ "${{ inputs.version_bump }}" = "minor" ] || [ "${{ inputs.version_bump }}" = "major" ]; then
                TAGS="${TAGS},${REPO}:latest"
                echo "platforms=linux/amd64,linux/arm64,linux/arm/v7" >> $GITHUB_OUTPUT
              fi

              if [ -n "${{ inputs.custom_tag }}" ]; then
                TAGS="${TAGS},${REPO}:${{ inputs.custom_tag }}"
              fi

              echo "tags=${TAGS}" >> $GITHUB_OUTPUT

         - name: Build and push Docker image
           uses: docker/build-push-action@v5
           with:
              context: .
              push: true
              platforms: ${{ steps.tags.outputs.platforms }}
              tags: ${{ steps.tags.outputs.tags }}
